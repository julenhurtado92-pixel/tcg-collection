name: Actualizar precios Cardmarket

on:
  workflow_dispatch:
    inputs:
      min_confidence:
        description: Confianza minima para match automatico
        required: false
        default: "72"
      force_download:
        description: Redescargar tablas Data Tables aunque exista cache
        required: false
        default: "true"
      pricing_mode:
        description: Modo de precio: hybrid usa listings live; datatables usa price guides diarios
        required: false
        default: "hybrid"
      listing_language:
        description: Idioma de listings. auto usa el idioma de cada item
        required: false
        default: "auto"
      listing_condition:
        description: Condicion minima de listings
        required: false
        default: "nm"
      listing_sample_size:
        description: Numero de ofertas validas para calcular la media
        required: false
        default: "5"
      force_live_download:
        description: Redescargar listings live aunque exista cache reciente
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  update-cardmarket-prices:
    runs-on: ubuntu-latest
    env:
      CARDMARKET_LIVE_API_KEY: ${{ secrets.CARDMARKET_LIVE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Actualizar precios Cardmarket V6 hybrid
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force_download }}" = "true" ]; then
            FORCE_FLAG="--force-download"
          fi
          LIVE_FORCE_FLAG=""
          if [ "${{ github.event.inputs.force_live_download }}" = "true" ]; then
            LIVE_FORCE_FLAG="--force-live-download"
          fi
          python scripts/update_cardmarket_prices.py \
            --portfolio docs/data/portfolio-data.json \
            --wishlist docs/data/wishlist-data.json \
            --overrides docs/data/cardmarket-overrides.json \
            --out docs/data \
            --cache .cache/cardmarket \
            --live-cache .cache/cardmarket-live \
            --update-portfolio \
            --update-wishlist \
            --min-confidence "${{ github.event.inputs.min_confidence }}" \
            --pricing-mode "${{ github.event.inputs.pricing_mode }}" \
            --listing-language "${{ github.event.inputs.listing_language }}" \
            --listing-condition "${{ github.event.inputs.listing_condition }}" \
            --listing-sample-size "${{ github.event.inputs.listing_sample_size }}" \
            --strict-matching \
            $FORCE_FLAG \
            $LIVE_FORCE_FLAG

      - name: Commit de resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/market-prices.json docs/data/market-prices.js
          git add docs/data/portfolio-data.json docs/data/portfolio-data.js
          git add docs/data/wishlist-data.json docs/data/wishlist-data.js
          git add docs/data/cardmarket-overrides.json
          git add docs/data/cardmarket-matching-report.json docs/data/cardmarket-matching-report.csv
          git add scripts/update_cardmarket_prices.py .github/workflows/update-cardmarket-prices.yml README_CARDMARKET.md docs/app.js docs/index.html docs/styles.css
          if git diff --staged --quiet; then
            echo "No hay cambios que commitear."
          else
            git commit -m "Actualizar precios Cardmarket V6 hybrid"
            git push
          fi
